# docker-compose.yml — поднимает 3 узла mygrep-server.
# Клиент mygrep запускается с хоста как обычная команда и шлёт запросы
# на проброшенные порты 9101, 9102, 9103.

services:
  server1:
    build: .
    image: mygrep-server:local
    command: ["-addr", ":8080"]
    ports: ["9101:8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 1s
      timeout: 1s
      retries: 10

  server2:
    build: .
    image: mygrep-server:local
    command: ["-addr", ":8080"]
    ports: ["9102:8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 1s
      timeout: 1s
      retries: 10

  server3:
    build: .
    image: mygrep-server:local
    command: ["-addr", ":8080"]
    ports: ["9103:8080"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 1s
      timeout: 1s
      retries: 10
